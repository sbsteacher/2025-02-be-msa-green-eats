constants:   # 커스텀 속성
  jwt:
    issuer: green502@green.com # JWT 토큰 발행자 정보
    bearer-format: JWT
    claim-key: signedUser
    secret-key: DeaguGreenArtAcademyClass502MsaClassFighting # 비밀 레시피(절대 공개되어서는 안 된다)
    access-token-cookie-name: access-token
    access-token-cookie-path: /
    access-token-cookie-validity-seconds: 898 # 15분 - 2초
    access-token-validity-milliseconds: 900_000 # 15분
    refresh-token-cookie-name: refresh-token
    refresh-token-cookie-path: /api/user/reissue
    refresh-token-cookie-validity-seconds: 1_295_998 # 15일 - 2초
    refresh-token-validity-milliseconds: 1_296_000_000 # 15일
spring:
  config:
    import:
      - optional:classpath:application-common.yml
  jpa:
    database: mysql
    properties:
      hibernate:
        jdbc:
          batch_size: 50 # 배치작업 크기 설정
        format_sql: true
        order_updates: true # JPA Batch 작업 활성화
    show-sql: true
