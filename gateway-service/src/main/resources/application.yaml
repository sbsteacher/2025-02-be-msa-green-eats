spring:
  config:
    import:
      - optional:classpath:application-common.yml
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        # MVC 게이트웨이 전용 CORS 설정
        webmvc:
          cors:
            configurations:
              '[/**]':
                allowedOrigins: "http://localhost:5173"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true

          # 라우팅 설정
          routes:
            - id: store-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/store/**

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/order/**
server:
  port: 8000