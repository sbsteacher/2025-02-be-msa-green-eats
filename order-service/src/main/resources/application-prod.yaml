server:
  port: 8082

spring:
  application:
    name: order-service
  config:
    import:
      - optional:classpath:application-common-prod.yaml
      - optional:classpath:application-auth-prod.yaml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${ORDER_DB_HOST}
    username: ${ORDER_DB_USERNAME}
    password: ${ORDER_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none

